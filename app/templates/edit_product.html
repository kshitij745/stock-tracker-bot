<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Edit Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            ✏ Edit Product
        </h2>

        <form method="POST" action="/update/{{ product.id }}">

            <div class="mb-3">

                <label class="form-label">
                    Product Name
                </label>

                <input
                    type="text"
                    name="product_name"
                    class="form-control"
                    value="{{ product.product_name }}"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Store
                </label>

                <select
                    name="store_name"
                    class="form-select"
                    required
                >

                    <option value="Flipkart"
                    {% if product.store_name=="Flipkart" %}selected{% endif %}>
                        Flipkart
                    </option>

                    <option value="Amazon"
                    {% if product.store_name=="Amazon" %}selected{% endif %}>
                        Amazon
                    </option>

                    <option value="Croma"
                    {% if product.store_name=="Croma" %}selected{% endif %}>
                        Croma
                    </option>

                    <option value="Reliance Digital"
                    {% if product.store_name=="Reliance Digital" %}selected{% endif %}>
                        Reliance Digital
                    </option>

                    <option value="OnePlus Store"
                    {% if product.store_name=="OnePlus Store" %}selected{% endif %}>
                        OnePlus Store
                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Product URL
                </label>

                <input
                    type="url"
                    name="product_url"
                    class="form-control"
                    value="{{ product.product_url }}"
                    required
                >

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Affiliate URL
                </label>

                <input
                    type="url"
                    name="affiliate_url"
                    class="form-control"
                    value="{{ product.affiliate_url if product.affiliate_url else '' }}"
                    placeholder="https://amzn.to/... or https://fkrt.cc/..."
                >

                <div class="form-text">
                    Optional. Agar blank rahega to notification me Product URL use hoga.
                </div>

            </div>

            <button class="btn btn-primary">
                💾 Update Product
            </button>

            <a href="/" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

</body>

</html>
