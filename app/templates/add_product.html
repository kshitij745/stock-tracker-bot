<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4 text-center">➕ Add New Product</h2>

        <form method="POST" action="/add">

            <!-- Product Name -->
            <div class="mb-3">
                <label class="form-label">
                    Product Name
                </label>

                <input
                    type="text"
                    name="product_name"
                    class="form-control"
                    placeholder="Samsung Galaxy M17"
                    required
                >
            </div>

            <!-- Store -->
            <div class="mb-3">

                <label class="form-label">
                    Store
                </label>

                <select
                    name="store_name"
                    class="form-select"
                    required
                >

                    <option value="">Select Store</option>

                    <option value="Flipkart">Flipkart</option>

                    <option value="Amazon">Amazon</option>

                    <option value="Croma">Croma</option>

                    <option value="Reliance Digital">Reliance Digital</option>

                    <option value="OnePlus Store">OnePlus Store</option>

                </select>

            </div>

            <!-- Product URL -->
            <div class="mb-3">

                <label class="form-label">
                    Product URL
                </label>

                <input
                    type="url"
                    name="product_url"
                    class="form-control"
                    placeholder="https://www.flipkart.com/..."
                    required
                >

            </div>

            <!-- Affiliate URL -->
            <div class="mb-4">

                <label class="form-label">
                    Affiliate URL
                </label>

                <input
                    type="url"
                    name="affiliate_url"
                    class="form-control"
                    placeholder="https://amzn.to/... or https://fkrt.cc/..."
                >

                <div class="form-text">
                    Optional. Agar blank chhodoge to Product URL use hoga.
                </div>

            </div>

            <div class="d-flex gap-2">

                <button
                    type="submit"
                    class="btn btn-success"
                >
                    💾 Save Product
                </button>

                <a
                    href="/"
                    class="btn btn-secondary"
                >
                    ← Back
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
